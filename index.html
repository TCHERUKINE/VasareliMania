<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Galerie - VasareliMania</title>

<style>

body{
    background:#120000;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
    margin:0;
    padding:0;
}

.container{
    width:1200px;
    margin:auto;
    background:linear-gradient(to bottom,#5a0000,#2b0000);
    min-height:100vh;
    box-shadow:0 0 60px black;
    padding-bottom:50px;
}

h1{
    font-size:70px;
    color:#ffe600;
    margin-top:20px;
    padding-top:20px;
    text-shadow:0 0 25px #ffcc00;
}

.gallery{
    margin-top:40px;
}

.gallery img{
    width:500px;
    margin:20px;
    border-radius:20px;
    border:3px solid #ffcc00;
    box-shadow:0 0 30px black;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.03);
}

.button{
    display:inline-block;
    margin-top:30px;
    padding:10px 28px;
    background:#000080;
    color:#ffe600;
    text-decoration:none;
    font-size:22px;
    border-radius:10px;
    font-weight:bold;
    border:2px solid #ffe600;
    box-shadow:0 0 12px #000040;
}

.button:hover{
    background:#001a66;
}

.footer{
    margin-top:50px;
    padding-bottom:30px;
    font-size:22px;
    color:#dddddd;
}

</style>

</head>

<body>

<div class="container">

<h1>Galerie VasareliMania</h1>

<div class="gallery">

<img src="images/image1.jpg">

<img src="images/image2.jpg">

<img src="images/image3.jpg">

<img src="images/image4.jpg">

</div>

<a class="button" href="./index.html">
Retour accueil
</a>

<div class="footer">
Pierre Tcherukine © 2008-2026
</div>

</div>

</body>
</html>
